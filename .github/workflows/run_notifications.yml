name: Run Stock Notifications

on:
  schedule:
    # JST 9:05 is UTC 0:05. Run Monday to Friday.
    - cron: '5 0 * * 1-5'
    # JST 15:35 is UTC 6:35. Run Monday to Friday.
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      session:
        description: 'Session to run (morning, evening, test)'
        required: true
        default: 'morning'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  run-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy yfinance pyarrow python-dotenv requests

      - name: Determine session parameter
        id: session-selector
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SESSION=${{ github.event.inputs.session }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "5 0 * * 1-5" ]; then
            echo "SESSION=morning" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "35 6 * * 1-5" ]; then
            echo "SESSION=evening" >> $GITHUB_ENV
          else
            # Fallback based on system time if triggered by other schedules
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt "3" ]; then
              echo "SESSION=morning" >> $GITHUB_ENV
            else
              echo "SESSION=evening" >> $GITHUB_ENV
            fi
          fi

      - name: Run notification check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python run_notification.py --session ${{ env.SESSION }}

      - name: Commit and push state changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes in notification configuration files
          git status --porcelain
          
          # Stage configuration files if they exist
          for file in notification_config.json notification_state.json artifacts/favorites.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done
          
          # Only commit and push if there are changes staged
          if ! git diff --quiet --cached; then
            git commit -m "Update notification configuration and state [skip ci]"
            # Pull latest changes using rebase to prevent non-fast-forward conflict
            git pull --rebase origin main
            git push origin main
          else
            echo "No config changes to commit."
          fi
